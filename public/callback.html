<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundyAI - Redirecionando...</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .callback-container {
      text-align: center;
      max-width: 500px;
      padding: 3rem 2rem;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 2rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1rem;
      color: #a1a1aa;
      line-height: 1.6;
    }

    .error-message {
      display: none;
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }

    .fallback-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: #6366f1;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .fallback-link:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="callback-container">
    <div class="spinner"></div>
    <h1>Bem-vindo de volta!</h1>
    <p id="callback-message">Redirecionando você para sua experiência escolhida...</p>
    
    <div id="error-message" class="error-message">
      <p>Não foi possível detectar o destino. Você será redirecionado para o painel principal.</p>
    </div>
    
    <a href="/index.html" class="fallback-link" style="display: none;" id="fallback-btn">
      Ir para Painel Principal
    </a>
  </div>

  <script>
    // callback.html - Ponte pós-login
    // ✅ NÃO altera sistema de login
    // ✅ Detecta destino salvo e redireciona
    // ✅ Fallback seguro para index.html

    console.log('🔗 [CALLBACK] Página de callback carregada');

    function redirectAfterLogin() {
      // Buscar destino salvo antes do login
      const destination = localStorage.getItem('postLoginRedirect');
      
      console.log('🔍 [CALLBACK] Destino detectado:', destination);

      if (destination) {
        // Mapear destino para URL
        const urlMap = {
          'analyze': '/analyze.html',
          'master': '/master.html',
          'chat': '/index.html'
        };

        const targetUrl = urlMap[destination] || '/index.html';
        
        console.log('✅ [CALLBACK] Redirecionando para:', targetUrl);
        
        // Limpar flag
        localStorage.removeItem('postLoginRedirect');
        
        // Aguardar 1 segundo para feedback visual
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 1000);

      } else {
        // Sem destino salvo, verificar se veio do login com parâmetro
        const urlParams = new URLSearchParams(window.location.search);
        const fromLogin = urlParams.get('from');
        
        if (fromLogin) {
          console.log('🔍 [CALLBACK] Origem detectada via URL:', fromLogin);
          
          // Redirecionar para index.html (painel principal)
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 1000);
        } else {
          // Fallback: mostrar erro e link manual
          console.warn('⚠️ [CALLBACK] Nenhum destino encontrado, mostrando fallback');
          
          const errorMsg = document.getElementById('error-message');
          const fallbackBtn = document.getElementById('fallback-btn');
          
          errorMsg.classList.add('show');
          fallbackBtn.style.display = 'inline-block';
          
          // Auto-redirect após 3 segundos
          setTimeout(() => {
            window.location.href = '/index.html';
          }, 3000);
        }
      }
    }

    // Executar ao carregar
    document.addEventListener('DOMContentLoaded', redirectAfterLogin);
  </script>
</body>
</html>
