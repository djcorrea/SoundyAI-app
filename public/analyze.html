<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Análise de Áudio — SoundyAI</title>
  <script>
    /* fallback necessário para motor legacy */
    window.tech = window.tech || "web";
  </script>
</head>
<body>

  <!-- ================================================================
       STUBS OCULTOS OBRIGATÓRIOS
       audio-analyzer-integration.js escreve nesses IDs internamente.
       Sem eles, hideUploadArea(), showAnalysisLoading() e
       displayModalResults() encontram null no getElementById e crasham.
       NÃO alterar os IDs.
  ================================================================ -->
  <div id="audioAnalysisModal" style="display:none;">
    <div id="audioUploadArea"></div>
    <div id="audioAnalysisLoading" style="display:none;">Analisando...</div>
    <div id="audioAnalysisResults"></div>
  </div>

  <!-- ================================================================
       UI PRINCIPAL
  ================================================================ -->
  <h1>Análise de Áudio</h1>

  <div>
    <input
      type="file"
      id="uploadInput"
      accept=".mp3,.wav,.flac,.m4a,.aiff,.ogg"
    />
  </div>

  <div>
    <label for="genreSelect">Gênero:</label>
    <select id="genreSelect">
      <option value="electronic">Electronic</option>
      <option value="hiphop">Hip-Hop</option>
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
      <option value="rnb">R&amp;B</option>
      <option value="jazz">Jazz</option>
      <option value="funk">Funk</option>
      <option value="sertanejo">Sertanejo</option>
      <option value="classical">Classical</option>
      <option value="pagode">Pagode</option>
      <option value="reggae">Reggae</option>
      <option value="metal">Metal</option>
    </select>
  </div>

  <div>
    <button id="analyzeBtn">Analisar</button>
  </div>

  <div id="resultsContainer"></div>

  <!-- ================================================================
       DEPENDÊNCIAS CRÍTICAS
       Carregadas antes dos scripts principais.

       logger.js           → define window.log e window.error.
                             __dbg (interno ao motor) chama log() —
                             sem este arquivo lança TypeError ao primeiro
                             arquivo selecionado.

       auth.js             → Firebase auth. createAnalysisJob() busca
                             idToken para análises de usuários logados.

       device-fingerprint.js   → requerido por anonymous-mode.js.

       anonymous-mode.js   → window.SoundyAnonymous — checado no início
                             de handleModalFileSelection.

       demo-core.js        → window.SoundyDemo — checado logo após.

       entitlements-handler.js → intercepta 403 PLAN_REQUIRED do backend.

       friendly-labels.js  → traduz labels técnicas nos resultados.

       band-key-aliases.js → normalização de bandas de frequência
                             (usado internamente pelo score engine).

       error-mapper.js     → mapeia erros do backend para mensagens
                             amigáveis exibidas no resultado.

       analysis-state-machine.js → DEVE ser síncrono (sem defer) e
                             carregado ANTES de audio-analyzer-integration.js.
                             No index.html também está sem defer.
  ================================================================ -->
  <script src="logger.js"></script>
  <script src="auth.js?v=20250810" defer></script>
  <script src="device-fingerprint.js?v=20260103" defer></script>
  <script src="anonymous-mode.js?v=20260102" defer></script>
  <script src="demo-core.js?v=20260102" defer></script>
  <script src="entitlements-handler.js?v=20260103"></script>
  <script src="friendly-labels.js?v=20250817" defer></script>
  <script src="/lib/audio/utils/band-key-aliases.js?v=1.0.0"></script>
  <script src="/error-mapper.js?v=1.0.0"></script>

  <!-- analysis-state-machine.js: síncrono, deve preceder o motor -->
  <script src="analysis-state-machine.js?v=PR2"></script>

  <!-- ================================================================
       SCRIPTS PRINCIPAIS (ordem conforme especificação)
  ================================================================ -->
  <script src="audio-analyzer-integration.js?v=20260130_1" defer></script>
  <script src="reference-flow.js?v=1.0.0" defer></script>

  <!-- ================================================================
       CONTROLADOR DA PÁGINA
       Implementação exata conforme especificação.
  ================================================================ -->
  <script>
    let selectedFile = null;

    document.getElementById("uploadInput").onchange = function(e) {
      selectedFile = e.target.files[0];
    };

    document.getElementById("analyzeBtn").onclick = function() {
      if (!selectedFile) {
        alert("Envie um áudio primeiro");
        return;
      }

      window.currentAnalysisMode = "genre";
      window.__CURRENT_SELECTED_GENRE = document.getElementById("genreSelect").value;
      window.__SOUNDY_ANALYSIS_MODE__ = "pista";

      handleModalFileSelection(selectedFile);
    };
  </script>

</body>
</html>
